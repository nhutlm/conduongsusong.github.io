<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mùa Hè Vui Chơi – Quà Tựa Mưa Rơi 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #1565C0;
      --red: #E63946;
      --yellow: #FFD600;
      --green: #2E7D32;
      --cream: #FFF8E7;
      --orange: #FF8C00;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #87CEEB;
      overflow-x: hidden;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes floatY {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0) scale(1); }
      35% { transform: translateY(-18px) scale(1.07); }
      65% { transform: translateY(-6px) scale(1.02); }
    }
    @keyframes fadeInDown {
      from { opacity:0; transform:translateY(-28px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity:0; transform:translateY(36px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes zoomIn {
      from { opacity:0; transform:scale(0.65); }
      to   { opacity:1; transform:scale(1); }
    }
    @keyframes shimmer {
      0%,100% { opacity:1; }
      50% { opacity:0.45; }
    }
    @keyframes wiggle {
      0%,100% { transform:rotate(-4deg) scale(1); }
      50% { transform:rotate(4deg) scale(1.05); }
    }
    @keyframes rainbowGlow {
      0%,100% { filter:brightness(1) saturate(1); }
      50% { filter:brightness(1.15) saturate(1.3); }
    }
    @keyframes dropFall {
      0%   { transform:translateY(-20px); opacity:0.8; }
      100% { transform:translateY(100px); opacity:0; }
    }
    @keyframes starPulse {
      0%,100% { transform:scale(1) rotate(0deg); opacity:1; }
      50% { transform:scale(1.4) rotate(20deg); opacity:0.7; }
    }

    /* ===== HERO: poster image ===== */
    .hero-poster {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      display: block;
      position: relative;
    }
    .hero-poster img {
      width: 100%;
      display: block;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }

    /* floating drops over poster */
    .drops-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .drop-fall {
      position: absolute;
      font-size: 20px;
      top: -30px;
      animation: dropFall 2.4s ease-in infinite;
    }

    /* floating star sparkles */
    .star-float {
      position: absolute;
      animation: starPulse 2s ease-in-out infinite;
      font-size: 18px;
      pointer-events: none;
    }

    /* ===== FEATURES SECTION ===== */
    .features-section {
      background: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%);
      padding: 0 0 36px;
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }
    .features-header {
      background: #E63946;
      font-family: 'Baloo 2', cursive;
      font-weight: 900;
      font-size: clamp(14px, 4vw, 20px);
      color: white;
      padding: 10px 30px;
      border-radius: 0 0 20px 20px;
      display: block;
      text-align: center;
      width: fit-content;
      margin: 0 auto 22px;
      box-shadow: 0 4px 15px rgba(230,57,70,0.4);
      letter-spacing: 1px;
      animation: fadeInDown 0.7s ease both;
    }
    .features-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      padding: 0 18px;
    }
    .feature-card {
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 18px;
      padding: 18px 12px;
      text-align: center;
      color: white;
      transition: transform 0.3s ease, background 0.3s ease;
      opacity: 0;
      transform: translateY(28px);
    }
    .feature-card.visible {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .feature-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.2); }
    .feature-icon {
      font-size: 34px;
      display: block;
      margin-bottom: 8px;
      animation: floatY 3s ease-in-out infinite;
    }
    .feature-card:nth-child(2) .feature-icon { animation-delay:0.5s; }
    .feature-card:nth-child(3) .feature-icon { animation-delay:1s; }
    .feature-card:nth-child(4) .feature-icon { animation-delay:1.5s; }
    .feature-text {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: clamp(12px, 3vw, 14px);
      line-height: 1.45;
    }
    .feature-text strong { color: #FFD600; display: block; font-size: 110%; margin-bottom: 2px; }

    /* ===== CTA SECTION ===== */
    .cta-section {
      background: linear-gradient(135deg, #FF8C00, #FF5722);
      padding: 32px 20px 36px;
      text-align: center;
      position: relative;
      max-width: 600px;
      margin: 0 auto;
      overflow: hidden;
    }
    .cta-section::before {
      content: '🎁  🎁  🎁  🎁  🎁  🎁  🎁  🎁';
      position: absolute;
      top: 8px; left: 0; right: 0;
      font-size: 18px;
      opacity: 0.18;
      white-space: nowrap;
      overflow: hidden;
    }
    .cta-title {
      font-family: 'Baloo 2', cursive;
      font-weight: 900;
      font-size: clamp(28px, 8vw, 52px);
      color: white;
      text-shadow: 0 3px 12px rgba(0,0,0,0.2);
      animation: zoomIn 0.8s ease both;
      line-height: 1.2;
    }
    .cta-drop-mascot {
      display: inline-block;
      animation: bounce 2s ease-in-out infinite;
      margin-top: 16px;
    }
    .cta-drop-mascot svg { width: 80px; height: auto; }

    /* ===== FOOTER ===== */
    .footer {
      background: #0D47A1;
      padding: 18px 20px;
      text-align: center;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      max-width: 600px;
      margin: 0 auto;
    }
    .footer strong { color: white; }

    /* page wrapper centers on wide screens */
    .page-wrap {
      max-width: 600px;
      margin: 0 auto;
      background: #87CEEB;
      min-height: 100vh;
      box-shadow: 0 0 60px rgba(0,0,0,0.15);
    }

    @media (max-width: 480px) {
      .features-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 12px; }
    }
  </style>
</head>

<script>
  // Scroll reveal for feature cards
  const cards = document.querySelectorAll('.feature-card');
  const observer = new IntersectionObserver(entries => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 120);
      }
    });
  }, { threshold: 0.15 });
  cards.forEach(c => observer.observe(c));
</script>
